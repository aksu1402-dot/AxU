<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niyet Muhasebesi — İnneme'l-A'mâlü bi'n-Niyyât</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --night:#101828;
  --night2:#18233d;
  --night3:#1f2c4d;
  --parchment:#f3ead8;
  --parchment2:#e9dcc0;
  --ink:#2a2418;
  --gold:#c9a227;
  --gold-soft:#e3c76a;
  --muted:#8fa0c4;
  --line:rgba(201,162,39,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--night);
  color:var(--parchment);
  font-family:'Lora',Georgia,serif;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:640px;
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* ---------- Başlık ---------- */
header{
  padding:18px 20px 14px;
  text-align:center;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--night2),var(--night));
}
.arabic{
  font-family:'Amiri',serif;
  font-size:1.7rem;
  color:var(--gold-soft);
  line-height:1.6;
  direction:rtl;
}
.hadis-tr{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;
  font-weight:600;
  letter-spacing:.04em;
  margin-top:2px;
}
.kaynak{
  font-size:.72rem;
  color:var(--muted);
  margin-top:4px;
  font-style:italic;
}

/* ---------- Tesbih ilerleme ---------- */
.tesbih{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  padding:12px 16px 10px;
}
.bead{
  width:9px;height:9px;
  border-radius:50%;
  border:1.5px solid var(--gold);
  background:transparent;
  transition:background .4s,box-shadow .4s;
  flex-shrink:0;
}
.bead.dolu{
  background:var(--gold);
  box-shadow:0 0 8px rgba(201,162,39,.55);
}
.puskul{
  width:2px;height:16px;
  background:var(--gold);
  opacity:.5;
  margin-left:2px;
  border-radius:1px;
}

/* ---------- Sohbet ---------- */
.sohbet{
  flex:1;
  overflow-y:auto;
  padding:14px 16px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}
.mesaj{
  max-width:100%;
  width:100%;
  padding:12px 15px;
  border-radius:14px;
  font-size:.95rem;
  line-height:1.55;
  animation:gel .35s ease both;
}
@keyframes gel{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@media (prefers-reduced-motion:reduce){
  .mesaj{animation:none}
}
.bot{
  align-self:flex-start;
  background:var(--night3);
  border:1px solid var(--line);
  border-bottom-left-radius:4px;
}
.bot .etiket{
  display:block;
  font-size:.68rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--gold-soft);
  margin-bottom:5px;
}
.kullanici{
  align-self:stretch;
  background:var(--parchment);
  color:var(--ink);
  border-left:3px solid var(--gold);
  border-bottom-right-radius:4px;
}

/* ---------- Cevap alanı ---------- */
.cevap-alani{
  border-top:1px solid var(--line);
  background:var(--night2);
  padding:12px 14px calc(12px + env(safe-area-inset-bottom));
}
.secenekler{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.secenek{
  text-align:left;
  font-family:'Lora',serif;
  font-size:.9rem;
  line-height:1.45;
  padding:11px 14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--night3);
  color:var(--parchment);
  cursor:pointer;
  transition:border-color .2s,background .2s;
}
.secenek:hover,.secenek:focus-visible{
  border-color:var(--gold);
  background:#253458;
  outline:none;
}
.secenek.secili{
  border-color:var(--gold);
  background:#2a3a63;
  box-shadow:0 0 0 1px var(--gold) inset;
}
.harf{
  color:var(--gold-soft);
  font-weight:600;
  margin-right:6px;
}
.metin-grup{display:flex;flex-direction:column;gap:8px}
textarea{
  width:100%;
  min-height:88px;
  resize:vertical;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--night3);
  color:var(--parchment);
  font-family:'Lora',serif;
  font-size:.92rem;
  line-height:1.5;
  padding:11px 13px;
}
textarea:focus-visible{outline:none;border-color:var(--gold)}
.btn{
  font-family:'Cormorant Garamond',serif;
  font-weight:700;
  font-size:1rem;
  letter-spacing:.05em;
  padding:11px 20px;
  border-radius:10px;
  border:1px solid var(--gold);
  background:var(--gold);
  color:var(--night);
  cursor:pointer;
  transition:background .2s;
}
.btn:hover,.btn:focus-visible{background:var(--gold-soft);outline:none}
.btn.ikincil{
  background:transparent;
  color:var(--gold-soft);
}
.btn.ikincil:hover{background:rgba(201,162,39,.12)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ---------- Sonuç ---------- */
.sonuc-butonlar{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.sonuc-butonlar .btn{width:100%}
.kopyalandi{
  font-size:.8rem;
  color:var(--gold-soft);
  text-align:center;
  min-height:1.1em;
}
.uyari{
  font-size:.78rem;
  color:var(--muted);
  font-style:italic;
  line-height:1.5;
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="arabic">إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ</div>
    <div class="hadis-tr">Ameller ancak niyetlere göredir</div>
    <div class="kaynak">Buhârî, Bed'ü'l-Vahy 1 · Müslim, İmâre 1907 · Nevevî, Kırk Hadis 1</div>
  </header>

  <div class="tesbih" id="tesbih" aria-label="İlerleme"></div>

  <main class="sohbet" id="sohbet" aria-live="polite"></main>

  <div class="cevap-alani" id="cevapAlani"></div>
</div>

<script>
"use strict";

/* ============================================================
   SORULAR
   Ölçüler: Gazâlî, İhyâu Ulûmi'd-Dîn (Kitâbü'n-Niyye ve'l-İhlâs
   ve's-Sıdk; Kitâbü Zemmi'l-Câh ve'r-Riyâ), İbn Receb,
   Câmiu'l-Ulûm ve'l-Hikem (1. hadis şerhi), İbn Atâullah, Hikem.
   ============================================================ */
const SORULAR = [
  {
    kategori: "Niyet Tazeleme (Tecdîd-i Niyet)",
    soru: "Bir hayır işine başlarken — namaz, sadaka, birine yardım — durup niyetini yokladığın olur mu?",
    tip: "secenek",
    secenekler: [
      "Her amelde dururum, niyetimi bilinçli olarak tazelerim",
      "Ara sıra, özellikle büyük işlerde aklıma gelir",
      "Nadiren düşünürüm",
      "Hiç düşünmem, alışkanlıkla yaparım"
    ]
  },
  {
    kategori: "Riyâ Ölçüsü (Halvet ve Toplum)",
    soru: "Gazâlî'nin ölçüsüyle soruyorum: Yalnızken kıldığın namaz ile insanların yanında kıldığın namaz arasında özen farkı var mı?",
    tip: "secenek",
    secenekler: [
      "Fark yok, ikisi de aynı",
      "Toplulukta daha özenli ve uzun tutarım",
      "Yalnızken daha huşulu olurum",
      "Emin değilim, hiç kıyaslamadım"
    ]
  },
  {
    kategori: "Sum'a (Duyurma)",
    soru: "Yaptığın bir iyiliği — sadaka, yardım, ibadet — kimse sormadan kendiliğinden anlattığın olur mu?",
    tip: "secenek",
    secenekler: [
      "Anlatmam, gizli kalmasını isterim",
      "Başkalarını teşvik niyetiyle bazen anlatırım",
      "Sohbet arasında farkında olmadan ağzımdan kaçar",
      "Anlatmaktan hoşlanırım"
    ]
  },
  {
    kategori: "Övgü ve Yergi (Medh u Zem)",
    soru: "Bir iyiliğinin ardından beklediğin takdir gelmediğinde ya da emeğin hiç fark edilmediğinde içinde ne olur?",
    tip: "secenek",
    secenekler: [
      "Hiçbir şey değişmez, karşılığı yalnız Allah'tan beklerim",
      "Kısa bir burukluk olur, sonra geçer",
      "Motivasyonum belirgin şekilde düşer",
      "Bir daha yapmak istemem"
    ]
  },
  {
    kategori: "Ucb (Kendini Beğenme)",
    soru: "İbadetinin arttığı ya da büyük bir hayır yaptığın bir dönemde, kendini başkalarından üstün hissettiğin oldu mu?",
    tip: "secenek",
    secenekler: [
      "Hayır, aksine kusurlarımı daha çok görürüm",
      "Bazen içimden geçer, fark edince istiğfar ederim",
      "Farkında olmadan kıyasladığım oluyor",
      "Evet, bunun hakkım olduğunu düşünürüm"
    ]
  },
  {
    kategori: "Gizli Amel Tercihi",
    soru: "İki seçenek önünde olsa: kimsenin asla bilmeyeceği gizli bir sadaka mı, herkesin göreceği açık bir bağış mı?",
    tip: "secenek",
    secenekler: [
      "Gizli olan, tereddütsüz",
      "Gizliyi seçerim ama açık olanın teşvik gücünü de düşünürüm",
      "Açık olan; örnek olmak önemli",
      "Açık olan; takdir edilmek hoşuma gider"
    ]
  },
  {
    kategori: "Karışık Niyet (Niyette Ortaklık)",
    soru: "Bir ibadete ya da hayra dünyevi bir fayda karıştığı oldu mu? Örneğin umreye giderken gezi hevesi, yardım ederken itibar beklentisi gibi. Kendi hayatından bir örnekle, olduğu gibi yaz.",
    tip: "metin"
  },
  {
    kategori: "Dünyevî Karşılık Beklentisi",
    soru: "İbadet ve dualarında asıl ağırlık nerede duruyor?",
    tip: "secenek",
    secenekler: [
      "Yalnız Allah'ın rızası",
      "Rızası ve ahiret kurtuluşu birlikte",
      "Çoğunlukla dünyevi ihtiyaçlar: rızık, sağlık, sınav, iş",
      "Sıkıntıya düşünce yönelirim, rahatken azalır"
    ]
  },
  {
    kategori: "Terk Anındaki His",
    soru: "Bir ibadeti kaçırdığında ya da bir hayrı yapamadığında seni asıl rahatsız eden nedir?",
    tip: "secenek",
    secenekler: [
      "Allah ile aramdaki bağın zayıflaması",
      "Sevaptan mahrum kalmak",
      "Düzenimin ve alışkanlığımın bozulması",
      "Çevrem beni düzenli ibadet eden biri bilir; o imajın sarsılması"
    ]
  },
  {
    kategori: "Amele Güvenmemek",
    soru: "İbn Atâullah 'Amele güvenme' der. Yaptığın ibadetlerin kabulü hakkında için ne söylüyor?",
    tip: "secenek",
    secenekler: [
      "Kabulünden emin olamam; korku ile ümit arasındayım",
      "Elimden geleni yaparım, gerisini Allah'a bırakırım",
      "Düzenli yapıyorum, kabul olmuştur diye düşünürüm",
      "Bunu hiç düşünmedim"
    ]
  },
  {
    kategori: "Görünürlük ve Paylaşım",
    soru: "Dinî bir içerik paylaşırken — ayet, hadis, güzel bir söz — gelen beğeni ve tepkiler paylaşma kararını etkiler mi?",
    tip: "secenek",
    secenekler: [
      "Etkilemez; doğru bilgiyi ulaştırmak için paylaşırım",
      "Az da olsa etkiler",
      "Tepki gelmeyince paylaşma isteğim düşer",
      "Bu tür paylaşım yapmıyorum"
    ]
  },
  {
    kategori: "Amel Sırasında Riyâ",
    soru: "Namaz ya da başka bir ibadet sırasında biri seni izlediğini fark ettiğinde içinde ne değişir?",
    tip: "secenek",
    secenekler: [
      "Hiçbir şey; çoğu zaman farkına bile varmam",
      "Kısa bir dalgalanma olur, niyetimi toparlarım",
      "Duruşum ve okuyuşum kendiliğinden güzelleşir",
      "İzlendiğimi bilmek hoşuma gider"
    ]
  },
  {
    kategori: "İş ve Amirin Gözü",
    soru: "İşinde fazladan bir emek verdiğinde, amirinin bunu bilmesi ile bilmemesi arasında fark hisseder misin?",
    tip: "secenek",
    secenekler: [
      "Fark yok; işi hakkıyla yapmak kulluğun parçası",
      "Bilmese de yaparım ama bilinmesi iyi hissettirir",
      "Bilinmeyecekse hevesim düşer",
      "Bilinsin diye görünür işlere yönelirim"
    ]
  },
  {
    kategori: "Süreklilik (Devamlılık Ölçüsü)",
    soru: "Ramazan ve kandiller dışındaki dönemlerde ibadet ve zikir temponda ne olur?",
    tip: "secenek",
    secenekler: [
      "Aynı kalır",
      "Biraz düşer ama süreklilik korunur",
      "Belirgin şekilde düşer",
      "Neredeyse durur"
    ]
  },
  {
    kategori: "İlim ve Üstünlük Hazzı",
    soru: "Dinî bir konuda birine bilgi verirken içinde 'ben biliyorum' hazzı hissettiğin olur mu?",
    tip: "secenek",
    secenekler: [
      "Hayır; bilgi emanettir, sadece aktarırım",
      "Bazen ince bir haz gelir, fark edince silkelenirim",
      "Sık sık olur",
      "Bilgili görünmek, paylaşma sebebimin bir parçası"
    ]
  },
  {
    kategori: "Nankörlük Karşısında Niyet",
    soru: "İyilik ettiğin biri nankörlük ederse ne yaparsın?",
    tip: "secenek",
    secenekler: [
      "Yine yaparım; karşılığı ondan değil Allah'tan beklerim",
      "Yaparım ama içimde kırgınlık kalır",
      "O kişiye bir daha yapmam",
      "İyilik yapmaktan genel olarak soğurum"
    ]
  },
  {
    kategori: "Halvette Direnç (Yalnızlık Testi)",
    soru: "Yalnızken günaha karşı direncin, insan içindeki direncinle aynı mı?",
    tip: "secenek",
    secenekler: [
      "Aynı; gören Allah",
      "Yalnızken biraz zayıflar",
      "Yalnızken belirgin şekilde zayıflar",
      "Toplum baskısı olmasa direnç kalmaz"
    ]
  },
  {
    kategori: "Kıraat ve Duada Süsleme",
    soru: "Sesli dua eder ya da Kur'an okurken dinleyen olduğunda sesini ve makamını süslediğin olur mu?",
    tip: "secenek",
    secenekler: [
      "Değişmez",
      "Kendiliğinden biraz düzelir, fark edince niyetimi yoklarım",
      "Bilerek güzelleştiririm, beğenilsin isterim",
      "Dinleyen yoksa sesli okumam"
    ]
  },
  {
    kategori: "Serbest Muhasebe",
    soru: "Son bir hafta içinde yaptığın bir iyiliği ya da ibadeti düşün. Onu yaparkenki niyetini süslemeden, kendine itiraf eder gibi yaz. Tek kelime değil; en az iki üç cümleyle, o anda kalbinden geçeni anlat.",
    tip: "metin"
  },
  {
    kategori: "Niyeti Bulandıran",
    soru: "Kendince: niyetini en çok ne bulandırıyor — takdir beklentisi, kıyas, alışkanlık, görünme arzusu, başka bir şey? Açıkça yaz.",
    tip: "metin"
  }
];

const HARFLER = ["a", "b", "c", "d"];

/* ---------- Durum ---------- */
let indeks = 0;
const cevaplar = [];

/* ---------- Öğeler ---------- */
const sohbetEl = document.getElementById("sohbet");
const cevapEl = document.getElementById("cevapAlani");
const tesbihEl = document.getElementById("tesbih");

/* ---------- Tesbih ---------- */
function tesbihKur() {
  tesbihEl.innerHTML = "";
  for (let i = 0; i < SORULAR.length; i++) {
    const b = document.createElement("div");
    b.className = "bead";
    tesbihEl.appendChild(b);
  }
  const p = document.createElement("div");
  p.className = "puskul";
  tesbihEl.appendChild(p);
}
function tesbihGuncelle() {
  const beadler = tesbihEl.querySelectorAll(".bead");
  beadler.forEach((b, i) => b.classList.toggle("dolu", i < cevaplar.length));
}

/* ---------- Mesajlar ---------- */
function botMesaj(html, etiket) {
  const m = document.createElement("div");
  m.className = "mesaj bot";
  m.innerHTML = (etiket ? '<span class="etiket">' + etiket + "</span>" : "") + html;
  sohbetEl.appendChild(m);
  sohbetEl.scrollTop = 0;
}

/* ---------- Akış ---------- */
function soruSor() {
  const s = SORULAR[indeks];
  sohbetEl.innerHTML = "";
  botMesaj(s.soru, "Soru " + (indeks + 1) + " / " + SORULAR.length + " · " + s.kategori);
  cevapAlaniKur(s);
}

function cevapAlaniKur(s) {
  cevapEl.innerHTML = "";
  const kap = document.createElement("div");
  kap.className = "metin-grup";
  let seciliCevap = null;

  const ileri = document.createElement("button");
  ileri.className = "btn";
  ileri.textContent = (indeks === SORULAR.length - 1) ? "Bitir" : "Sonraki Soru →";
  ileri.disabled = true;

  if (s.tip === "secenek") {
    const liste = document.createElement("div");
    liste.className = "secenekler";
    s.secenekler.forEach((metin, i) => {
      const b = document.createElement("button");
      b.className = "secenek";
      b.innerHTML = '<span class="harf">' + HARFLER[i] + ")</span>" + metin;
      b.addEventListener("click", () => {
        liste.querySelectorAll(".secenek").forEach(x => x.classList.remove("secili"));
        b.classList.add("secili");
        seciliCevap = HARFLER[i] + ") " + metin;
        ileri.disabled = false;
      });
      liste.appendChild(b);
    });
    kap.appendChild(liste);
  } else {
    const ta = document.createElement("textarea");
    ta.placeholder = "Cevabını buraya yaz...";
    ta.addEventListener("input", () => {
      seciliCevap = ta.value.trim();
      ileri.disabled = seciliCevap.length === 0;
    });
    kap.appendChild(ta);
    setTimeout(() => ta.focus(), 100);
  }

  ileri.addEventListener("click", () => {
    if (!seciliCevap) return;
    cevapVer(seciliCevap);
  });
  kap.appendChild(ileri);
  cevapEl.appendChild(kap);
}

function cevapVer(metin) {
  const s = SORULAR[indeks];
  cevaplar.push({ kategori: s.kategori, soru: s.soru, cevap: metin });
  tesbihGuncelle();
  indeks++;
  cevapEl.innerHTML = "";
  if (indeks < SORULAR.length) {
    soruSor();
  } else {
    sohbetEl.innerHTML = "";
    bitir();
  }
}

/* ---------- Bitiş ---------- */
function rapor() {
  const tarih = new Date().toLocaleDateString("tr-TR", {
    day: "numeric", month: "long", year: "numeric"
  });
  let m = "NİYET MUHASEBESİ — CEVAPLARIM\n";
  m += "Hadis: \"İnneme'l-a'mâlü bi'n-niyyât\" (Buhârî, Bed'ü'l-Vahy 1; Müslim, İmâre 1907)\n";
  m += "Tarih: " + tarih + "\n";
  m += "----------------------------------------\n\n";
  cevaplar.forEach((c, i) => {
    m += "S" + (i + 1) + " [" + c.kategori + "]\n";
    m += "Soru: " + c.soru + "\n";
    m += "Cevabım: " + c.cevap + "\n\n";
  });
  m += "----------------------------------------\n";
  m += "Bu cevapları Gazâlî'nin ihlâs-riyâ ölçüleri çerçevesinde değerlendirip yol göster.";
  return m;
}

function bitir() {
  botMesaj(
    "Muhasebe tamamlandı. Unutma: niyet kalp işidir, hükmünü ancak Allah bilir. " +
    "Bu sorular yalnızca kendine tutulan bir aynadır.<br><br>" +
    "Aşağıdaki butonla tüm cevaplarını kopyalayıp Claude'a yapıştır; " +
    "değerlendirme ve yol gösterme sohbette yapılacak.",
    "Tamamlandı"
  );

  cevapEl.innerHTML = "";
  const kap = document.createElement("div");
  kap.className = "metin-grup";

  const butonlar = document.createElement("div");
  butonlar.className = "sonuc-butonlar";

  const kopyala = document.createElement("button");
  kopyala.className = "btn";
  kopyala.textContent = "Cevapları Kopyala";

  const yeniden = document.createElement("button");
  yeniden.className = "btn ikincil";
  yeniden.textContent = "Baştan Başla";
  yeniden.addEventListener("click", () => location.reload());

  const durum = document.createElement("div");
  durum.className = "kopyalandi";

  const uyari = document.createElement("div");
  uyari.className = "uyari";
  uyari.textContent = "Ölçüler: Gazâlî (İhyâ, Niyet-İhlâs ve Riyâ bölümleri), İbn Receb (Câmiu'l-Ulûm, 1. hadis), İbn Atâullah (Hikem).";

  kopyala.addEventListener("click", async () => {
    const metin = rapor();
    let basarili = false;
    try {
      await navigator.clipboard.writeText(metin);
      basarili = true;
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = metin;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { basarili = document.execCommand("copy"); } catch (e2) { basarili = false; }
      document.body.removeChild(ta);
    }
    durum.textContent = basarili
      ? "Kopyalandı. Şimdi Claude'a yapıştırabilirsin."
      : "Kopyalama engellendi; metni aşağıdan elle seçip kopyala.";
    if (!basarili) {
      const yedek = document.createElement("textarea");
      yedek.value = metin;
      yedek.style.minHeight = "160px";
      kap.appendChild(yedek);
      yedek.select();
    }
  });

  butonlar.appendChild(kopyala);
  butonlar.appendChild(yeniden);
  kap.appendChild(butonlar);
  kap.appendChild(durum);
  kap.appendChild(uyari);
  cevapEl.appendChild(kap);
}

/* ---------- Başlat ---------- */
tesbihKur();
botMesaj(
  "Selâmün aleyküm. Bu muhasebe, <em>\"Ameller niyetlere göredir\"</em> hadisi ışığında " +
  "niyetini kendine sormanı sağlayan " + SORULAR.length + " sorudan oluşur. Sorular Gazâlî'nin ihlâs ve riyâ " +
  "ölçülerinden derlenmiştir. Dürüst cevap ver; burada doğru ya da yanlış yok, " +
  "yalnızca ayna var.",
  "Niyet Muhasebesi"
);
function basla() {
  cevapEl.innerHTML = "";
  const kap = document.createElement("div");
  kap.className = "metin-grup";
  const b = document.createElement("button");
  b.className = "btn";
  b.textContent = "Başla";
  b.addEventListener("click", soruSor);
  kap.appendChild(b);
  cevapEl.appendChild(kap);
}
basla();
</script>
