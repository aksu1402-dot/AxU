<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetih Destesi - KPSS Tarih</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #141013;
    color: #F2E9D8;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, #C9A24B 0, transparent 40%),
      radial-gradient(circle at 80% 80%, #7C1F1F 0, transparent 40%);
    opacity: 0.05;
    pointer-events: none;
  }
  .wrap { width: 100%; max-width: 380px; position: relative; z-index: 1; }
  .hidden { display: none !important; }

  /* Başlangıç ekranı */
  #startScreen { text-align: center; padding: 40px 0; }
  #startScreen .eyebrow {
    color: #C9A24B; letter-spacing: 0.3em; font-size: 10px; text-transform: uppercase;
  }
  #startScreen h1 { font-size: 36px; font-weight: bold; margin: 10px 0; }
  #startScreen p { color: #B9AE94; font-size: 14px; line-height: 1.6; padding: 0 16px; margin-bottom: 16px; }
  .card-fan { display: flex; justify-content: center; gap: 8px; padding: 8px 0 20px; }
  .card-fan div {
    width: 56px; height: 80px; border-radius: 8px;
    border: 2px solid rgba(201,162,75,0.4); background: #1E1A16;
  }
  .card-fan div:nth-child(1) { transform: rotate(-8deg) translateY(6px); }
  .card-fan div:nth-child(3) { transform: rotate(8deg) translateY(6px); }

  button.primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: #C9A24B; color: #141013; font-weight: bold; font-family: inherit;
    padding: 12px 32px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer;
  }
  button.primary:hover { background: #DCB65E; }

  /* Oyun ekranı */
  #playScreen { display: none; }
  #playScreen.active { display: block; }
  .topbar { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #B9AE94; margin-bottom: 8px; }
  .topbar .title { color: #C9A24B; font-weight: bold; }
  .streak { text-align: center; color: #C9A24B; font-size: 12px; font-weight: bold; margin-bottom: 8px; height: 16px; }

  .card-area { position: relative; height: 320px; perspective: 1200px; margin-bottom: 16px; }
  .card-area .stack-back {
    position: absolute; inset: 0; border-radius: 12px; border: 1px solid #3A342C; background: #1B1917;
  }
  .stack1 { transform: translateY(12px) scale(0.96); }
  .stack2 { transform: translateY(6px) scale(0.98); }

  .card-slide {
    position: absolute; inset: 0;
    transition: transform 0.3s ease-out, opacity 0.3s ease-out;
  }
  .card-flip {
    position: relative; width: 100%; height: 100%; cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.55s;
  }
  .card-flip.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0; border-radius: 12px; padding: 24px;
    display: flex; flex-direction: column; justify-content: space-between; align-items: center;
    backface-visibility: hidden;
  }
  .card-front { border: 2px solid rgba(201,162,75,0.5); background: #1B1917; }
  .card-back {
    border: 2px solid rgba(76,122,76,0.6); background: #1B211B;
    transform: rotateY(180deg); justify-content: center; gap: 12px;
  }
  .face-label { font-size: 10px; letter-spacing: 0.25em; color: #8C8266; text-transform: uppercase; }
  .card-front p { font-size: 18px; line-height: 1.4; text-align: center; }
  .card-front .hint { font-size: 10px; color: #8C8266; }
  .card-back p { font-size: 20px; font-weight: bold; text-align: center; color: #DCE9D6; }

  .judge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .judge-row button {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px; border-radius: 8px; font-weight: bold; font-family: inherit; font-size: 14px;
    cursor: pointer; background: transparent;
  }
  .btn-no { border: 2px solid #A23B3B; color: #E39B9B; }
  .btn-no:hover { background: #2A1B1B; }
  .btn-yes { border: 2px solid #4C7A4C; color: #9FD79F; }
  .btn-yes:hover { background: #1B2A1B; }
  .prompt { height: 52px; display: flex; align-items: center; justify-content: center; color: #8C8266; font-size: 12px; }

  /* Bitiş ekranı */
  #overScreen { display: none; text-align: center; padding: 32px 0; }
  #overScreen.active { display: block; }
  #overScreen .eyebrow { color: #C9A24B; letter-spacing: 0.3em; font-size: 10px; text-transform: uppercase; }
  #overScreen h2 { font-size: 28px; font-weight: bold; margin: 12px 0 20px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-box { border: 1px solid #3A342C; border-radius: 8px; padding: 12px 0; background: #1B1917; }
  .stat-box .val { font-size: 20px; font-weight: bold; color: #C9A24B; }
  .stat-box .lbl { font-size: 10px; color: #8C8266; margin-top: 4px; }

  svg.icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
</style>
</head>

<div class="wrap">

  <!-- BAŞLANGIÇ -->
  <div id="startScreen">

    <button class="primary" onclick="startGame()">

  </div>

  <!-- OYUN -->

      <div id="scoreLabel">0 puan</div>
    </div>

          </div>

            <div class="face-label">Cevap</div>
            <p id="answerText"></p>
          </div>
        </div>
      </div>
    </div>

    <div id="judgeRow" class="judge-row hidden">
      <button class="btn-no" onclick="judge(false)">
        <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Bilemedim
      </button>
      <button class="btn-yes" onclick="judge(true)">
        <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Bildim
      </button>
    </div>
    <div id="promptRow" class="prompt">önce kartı çevir</div>
  </div>

  <!-- BİTİŞ -->
  <div id="overScreen">
    <div class="eyebrow">Deste Bitti</div>
    <h2 id="overTitle"></h2>
    <div class="stats">
      <div class="stat-box"><div class="val" id="statScore">0</div><div class="lbl">Puan</div></div>
      <div class="stat-box"><div class="val" id="statStreak">0</div><div class="lbl">En İyi Seri</div></div>
      <div class="stat-box"><div class="val" id="statRatio">%0</div><div class="lbl">Doğruluk</div></div>
    </div>
    <button class="primary" onclick="startGame()">
      <svg class="icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Desteyi Yeniden Karıştır
    </button>
  </div>

</div>

const TITLES = [
  { min: 0, title: "Uc Beyi" },
  { min: 8, title: "Sancak Beyi" },
  { min: 16, title: "Vezir" },
  { min: 24, title: "Sadrazam" },
  { min: 32, title: "Padişah" },
];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let deck = [];
let pos = 0;
let flipped = false;
let judging = false;
let score = 0;
let wrong = 0;
let streak = 0;
let bestStreak = 0;

const startScreen = document.getElementById('startScreen');
const playScreen = document.getElementById('playScreen');
const overScreen = document.getElementById('overScreen');
const cardSlide = document.getElementById('cardSlide');
const cardFlip = document.getElementById('cardFlip');
const judgeRow = document.getElementById('judgeRow');
const promptRow = document.getElementById('promptRow');

function currentTitle() {
  let t = TITLES[0].title;
  for (const step of TITLES) if (streak >= step.min) t = step.title;
  return t;
}

function startGame() {
  deck = shuffle(DATA);
  pos = 0;
  flipped = false;
  judging = false;
  score = 0;
  wrong = 0;
  streak = 0;
  bestStreak = 0;

  startScreen.classList.add('hidden');
  overScreen.classList.remove('active');
  playScreen.classList.add('active');

  renderCard();
}

function renderCard() {
  if (pos >= deck.length) { endGame(); return; }
  const [q, a] = deck[pos];
  document.getElementById('questionText').textContent = q;
  document.getElementById('answerText').textContent = a;
  flipped = false;
  cardFlip.classList.remove('flipped');
  judgeRow.classList.add('hidden');
  promptRow.classList.remove('hidden');
  promptRow.textContent = 'önce kartı çevir';
  cardSlide.style.transform = 'translateX(0) rotate(0deg)';
  cardSlide.style.opacity = '1';
  updateTopbar();
}

function updateTopbar() {
  document.getElementById('remainingLabel').textContent = (deck.length - pos) + '/' + deck.length;
  document.getElementById('titleLabel').textContent = currentTitle();
  document.getElementById('scoreLabel').textContent = score + ' puan';
  const streakLabel = document.getElementById('streakLabel');
  streakLabel.textContent = streak > 1 ? ('\u{1F525} ' + streak + ' kart üst üste') : '';
}

function flipCard() {
  if (judging) return;
  flipped = !flipped;
  cardFlip.classList.toggle('flipped', flipped);
  if (flipped) {
    judgeRow.classList.remove('hidden');
    promptRow.classList.add('hidden');
  } else {
    judgeRow.classList.add('hidden');
    promptRow.classList.remove('hidden');
  }
}

function judge(bildim) {
  if (judging || !flipped) return;
  judging = true;
  judgeRow.classList.add('hidden');

  if (bildim) {
    streak += 1;
    bestStreak = Math.max(bestStreak, streak);
    score += 10 + (streak - 1) * 2;
    cardSlide.style.transform = 'translateX(140%) rotate(20deg)';
  } else {
    streak = 0;
    wrong += 1;
    cardSlide.style.transform = 'translateX(-140%) rotate(-20deg)';
  }
  cardSlide.style.opacity = '0';
  updateTopbar();

  setTimeout(() => {
    pos += 1;
    judging = false;
    renderCard();
  }, 320);
}

function endGame() {
  playScreen.classList.remove('active');
  overScreen.classList.add('active');
  const total = deck.length;
  const dogru = total - wrong;
  const oran = total ? Math.round((dogru / total) * 100) : 0;
  document.getElementById('overTitle').textContent = total + ' kart tamamlandı';
  document.getElementById('statScore').textContent = score;
  document.getElementById('statStreak').textContent = bestStreak;
  document.getElementById('statRatio').textContent = '%' + oran;
}
